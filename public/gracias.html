<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mensaje recibido — Tomás Carbonero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Cinzel:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dorado: #C8A96E;
      --obsidiana: #080706;
      --crema: #F5F0E8;
      --font-serif: 'Cormorant Garamond', serif;
      --font-label: 'Cinzel', serif;
    }
    body {
      background: var(--obsidiana);
      color: var(--crema);
      font-family: var(--font-serif);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .marca {
      font-family: var(--font-label);
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--dorado);
      margin-bottom: 2.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1.15;
      color: var(--crema);
      margin-bottom: 1.25rem;
    }
    p {
      font-size: clamp(1rem, 2vw, 1.15rem);
      font-weight: 300;
      color: rgba(245,240,232,0.65);
      max-width: 36ch;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .sep {
      width: 40px;
      height: 1px;
      background: var(--dorado);
      margin: 0 auto 2.5rem;
      opacity: 0.5;
    }
    a.volver {
      font-family: var(--font-label);
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--obsidiana);
      background: var(--dorado);
      padding: 14px 32px;
      text-decoration: none;
      transition: background 0.3s;
    }
    a.volver:hover { background: #e2ca92; }
  </style>
</head>
<body>
  <p class="marca">Tomás Carbonero</p>
  <h1>Mensaje recibido</h1>
  <div class="sep"></div>
  <p>Gracias por escribirnos. Nos pondremos en contacto contigo a la brevedad.</p>
  <a href="/" class="volver">Volver al inicio</a>
</body>
</html>
